<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 체크 로그 v7</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#070d18;
  color:#e2e8f0;
  font-family:'Noto Sans KR',sans-serif;
  padding:20px;
}
.wrap{max-width:520px;margin:auto;}
h1{font-size:22px;margin-bottom:16px;}

.card{
  background:#0c1525;
  border:1px solid #182a40;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #182a40;
  background:#112035;
  color:#fff;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00e5ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
}

.log{
  border-bottom:1px solid #182a40;
  padding:8px 0;
  font-size:13px;
}

.stat{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:4px;
}

.ok{color:#00e5ff;}
.bad{color:#fb7185;}

</style>
</head>

<body>
<div class="wrap">

<h1>📊 투자 체크 로그</h1>

<div class="card">
  <textarea id="qs" placeholder='SAVE::{"date":"2026-03-28","plusSh":250}'></textarea>
  <button onclick="quickSave()">⚡ 빠른 저장</button>
</div>

<div class="card">
  <input type="date" id="date">
  <input type="number" id="plus" placeholder="PLUS 수량">
  <input type="number" id="kodex" placeholder="KODEX 수량">
  <input type="number" id="total" placeholder="총 자산">
  <button onclick="save()">저장</button>
</div>

<div class="card">
  <div class="stat"><span>기록 수</span><span id="cnt">0</span></div>
  <div class="stat"><span>PLUS 증가</span><span id="s-plus">-</span></div>
  <div class="stat"><span>KODEX 증가</span><span id="s-kodex">-</span></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card" id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const KEY = "invest-v7";
let data = [];
let chart = null;

// 초기화
function init(){
  const saved = localStorage.getItem(KEY);
  if(saved) data = JSON.parse(saved);

  document.getElementById('date').value =
    new Date().toISOString().slice(0,10);

  render();
}

// 저장
function persist(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

// 추가/수정
function upsert(rec){
  const i = data.findIndex(d=>d.date===rec.date);
  if(i>=0) data[i]=rec;
  else data.push(rec);

  data.sort((a,b)=>a.date.localeCompare(b.date));
}

// 빠른 저장
function quickSave(){
  const raw = document.getElementById('qs').value;

  const match = raw.match(/SAVE::({[\s\S]*?})/);
  if(!match) return alert("형식 오류");

  try{
    const d = JSON.parse(match[1]);
    upsert({
      date:d.date,
      plusSh:d.plusSh||0,
      kodexSh:d.kodexSh||0,
      total:d.total||0
    });
    persist();
    render();
    alert("저장 완료");
  }catch{
    alert("JSON 오류");
  }
}

// 수동 저장
function save(){
  const rec = {
    date:document.getElementById('date').value,
    plusSh:+document.getElementById('plus').value||0,
    kodexSh:+document.getElementById('kodex').value||0,
    total:+document.getElementById('total').value||0
  };

  if(!rec.date || !rec.plusSh){
    alert("필수값 부족");
    return;
  }

  upsert(rec);
  persist();
  render();
}

// 통계 + 차트 + 로그
function render(){

  document.getElementById('cnt').textContent = data.length;

  if(data.length>=2){
    const f=data[0],l=data[data.length-1];
    document.getElementById('s-plus').textContent = "+"+(l.plusSh-f.plusSh);
    document.getElementById('s-kodex').textContent = "+"+(l.kodexSh-f.kodexSh);
  }

  renderChart();
  renderLogs();
}

// 차트
function renderChart(){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'),{
    type:'line',
    data:{
      labels:data.map(d=>d.date),
      datasets:[
        {
          label:'PLUS',
          data:data.map(d=>d.plusSh)
        },
        {
          label:'KODEX',
          data:data.map(d=>d.kodexSh)
        }
      ]
    }
  });
}

// 로그
function renderLogs(){
  const el = document.getElementById('logs');

  el.innerHTML = data.map(d=>`
    <div class="log">
      ${d.date} | PLUS ${d.plusSh} | KODEX ${d.kodexSh}
    </div>
  `).reverse().join('');
}

init();
</script>

</body>
</html>
