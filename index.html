<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 체크 로그</title>

<style>
body {
  background:#0f172a;
  color:#e2e8f0;
  font-family:sans-serif;
  padding:20px;
}

.wrap {
  max-width:480px;
  margin:0 auto;
}

.tabs {
  display:flex;
  gap:8px;
  margin-bottom:20px;
}

.tab {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#1e293b;
  color:#94a3b8;
}

.tab.active {
  background:#0ea5e9;
  color:#000;
  font-weight:bold;
}

.card {
  background:#1e293b;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
  background:#0f172a;
  color:#fff;
}

button.save {
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.log {
  padding:10px;
  border-bottom:1px solid #334155;
}
</style>
</head>

<body>
<div class="wrap">

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')">입력</button>
  <button class="tab" onclick="switchTab('records')">기록</button>
</div>

<!-- 입력 -->
<div id="tab-input">
  <div class="card">
    <input type="date" id="date">
    <input type="number" id="plus" placeholder="PLUS 수량">
    <input type="number" id="kodex" placeholder="KODEX 수량">
    <button class="save" onclick="save()">저장</button>
  </div>
</div>

<!-- 기록 -->
<div id="tab-records" style="display:none">
  <div class="card" id="list"></div>
</div>

</div>

<script>
const KEY = 'invest-data';

let data = [];

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
  load();
  render();
});

function switchTab(tab){
  document.getElementById('tab-input').style.display = tab==='input'?'block':'none';
  document.getElementById('tab-records').style.display = tab==='records'?'block':'none';

  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active', (tab==='input' && i===0)||(tab==='records' && i===1));
  });

  if(tab==='records') render();
}

function save(){
  const rec = {
    date:document.getElementById('date').value,
    plus:+document.getElementById('plus').value||0,
    kodex:+document.getElementById('kodex').value||0
  };

  if(!rec.date || !rec.plus){
    alert('값 입력해');
    return;
  }

  data.push(rec);
  data.sort((a,b)=>a.date.localeCompare(b.date));

  localStorage.setItem(KEY, JSON.stringify(data));

  alert('저장 완료');
}

function load(){
  const raw = localStorage.getItem(KEY);
  if(raw) data = JSON.parse(raw);
}

function render(){
  const list = document.getElementById('list');

  if(data.length===0){
    list.innerHTML = '기록 없음';
    return;
  }

  list.innerHTML = data.slice().reverse().map(r=>`
    <div class="log">
      ${r.date} / PLUS ${r.plus} / KODEX ${r.kodex}
    </div>
  `).join('');
}
</script>

</body>
</html>
