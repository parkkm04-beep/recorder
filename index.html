<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 체크 로그 v7</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#070d18;
  color:#e2e8f0;
  font-family:'Noto Sans KR',sans-serif;
  padding:20px;
}
.wrap{max-width:520px;margin:auto;}
h1{font-size:22px;margin-bottom:16px;}

.card{
  background:#0c1525;
  border:1px solid #182a40;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #182a40;
  background:#112035;
  color:#fff;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00e5ff;
  color:#000;
  font-weight:700;
  cursor:pointer;
}

.log{
  border-bottom:1px solid #182a40;
  padding:8px 0;
  font-size:13px;
}

.stat{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:4px;
}

.ok{color:#00e5ff;}
.bad{color:#fb7185;}

</style>
</head>

<body>
<div class="wrap">

<h1>📊 투자 체크 로그</h1>

<div class="card">
  <textarea id="qs" placeholder='SAVE::{"date":"2026-03-28","plusSh":250}'></textarea>
  <button onclick="quickSave()">⚡ 빠른 저장</button>
</div>

<div class="card">
  <input type="date" id="date">
  <input type="number" id="plus" placeholder="PLUS 수량">
  <input type="number" id="kodex" placeholder="KODEX 수량">
  <input type="number" id="total" placeholder="총 자산">
  <button onclick="save()">저장</button>
</div>

<div class="card">
  <div class="stat"><span>기록 수</span><span id="cnt">0</span></div>
  <div class="stat"><span>PLUS 증가</span><span id="s-plus">-</span></div>
  <div class="stat"><span>KODEX 증가</span><span id="s-kodex">-</span></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card" id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const SKEY = 'invest-logs-v7';
const GKEY = 'invest-goals-v2';

let records = [];
let goals = null;

// ----------------------
// 초기화
// ----------------------
init();

function init(){
  loadData();
  renderAll();
}

// ----------------------
// 데이터 로드
// ----------------------
function loadData(){
  try{
    const r = localStorage.getItem(SKEY);
    if(r) records = JSON.parse(r);
  }catch{ records=[] }

  try{
    const g = localStorage.getItem(GKEY);
    if(g) goals = JSON.parse(g);
  }catch{ goals=null }
}

// ----------------------
// 저장
// ----------------------
function persist(){
  localStorage.setItem(SKEY, JSON.stringify(records));
}

function persistGoal(){
  localStorage.setItem(GKEY, JSON.stringify(goals));
}

// ----------------------
// 기록 저장
// ----------------------
function saveRecord(){
  const rec = {
    date: document.getElementById('inp-date').value,
    plusSh: +inp('inp-plus-sh'),
    kodexSh: +inp('inp-kodex-sh'),
    total: +inp('inp-total')
  };

  if(!rec.date || !rec.plusSh){
    alert('필수값 부족');
    return;
  }

  upsertRecord(rec);
  persist();
  renderAll();
}

function upsertRecord(rec){
  const i = records.findIndex(r=>r.date===rec.date);
  if(i>=0) records[i]=rec;
  else records.push(rec);

  records.sort((a,b)=>a.date.localeCompare(b.date));
}

// ----------------------
// 목표 저장
// ----------------------
function saveGoal(goalData){

  goals = {
    discharge: goalData.discharge,
    monthGoal: goalData.monthGoal,
    createdAt: today()
  };

  persistGoal();
  renderAll();
}

// ----------------------
// 목표 계산
// ----------------------
function analyzeGoal(){

  if(!goals || records.length < 2) return '';

  const first = records[0];
  const last  = records[records.length-1];

  const days = daysDiff(first.date, last.date);

  const plusSpeed = (last.plusSh - first.plusSh) / days;

  const target = goals.discharge;

  const remain = target.plusSh - last.plusSh;
  const remainDays = daysDiff(today(), "2027-04-17");

  const needSpeed = remain / remainDays;

  const ok = plusSpeed >= needSpeed;

  return `
  <div style="margin-bottom:10px;font-size:11px;">
    현재 속도: +${plusSpeed.toFixed(2)}주/일<br>
    필요 속도: +${needSpeed.toFixed(2)}주/일<br>
    <b style="color:${ok?'#22c55e':'#ef4444'}">
      ${ok?'목표 달성 가능':'속도 부족'}
    </b>
  </div>
  `;
}

// ----------------------
// 전역 목표 UI
// ----------------------
function renderDischarge(){

  const el = document.getElementById('discharge-section');

  if(!goals){
    el.innerHTML = '목표 없음';
    return;
  }

  const last = records[records.length-1];
  if(!last){
    el.innerHTML = '데이터 없음';
    return;
  }

  const g = goals.discharge;

  const pct = Math.round(last.plusSh / g.plusSh * 100);

  el.innerHTML = `
    <div>
      <h3>🎖️ 전역 목표</h3>
      <div>현재: ${last.plusSh} / ${g.plusSh}주 (${pct}%)</div>
      ${analyzeGoal()}
    </div>
  `;
}

// ----------------------
// 월 목표
// ----------------------
function renderMonthGoal(){

  const el = document.getElementById('month-goal-card');

  if(!goals || !goals.monthGoal){
    el.innerHTML = '월 목표 없음';
    return;
  }

  const ym = today().slice(0,7);

  const recs = records.filter(r=>r.date.startsWith(ym));
  if(!recs.length){
    el.innerHTML = '이번 달 기록 없음';
    return;
  }

  const last = recs[recs.length-1];
  const g = goals.monthGoal;

  const pct = Math.round(last.plusSh / g.plusSh * 100);

  el.innerHTML = `
    <div>
      <h3>📅 이번 달 목표</h3>
      <div>${last.plusSh} / ${g.plusSh} (${pct}%)</div>
    </div>
  `;
}

// ----------------------
// 렌더
// ----------------------
function renderAll(){
  renderDischarge();
  renderMonthGoal();
}

// ----------------------
// 유틸
// ----------------------
function inp(id){
  return document.getElementById(id).value || 0;
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function daysDiff(a,b){
  return Math.max(1,(new Date(b)-new Date(a))/(1000*60*60*24));
}

</script>

</body>
</html>
